server {
    listen 80;
    server_name kidokool.xyz www.kidokool.xyz;

    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Proper proxy headers for IP and Proto
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Serve static files directly for better performance
    location /_next/static {
        alias /home/ubuntu/kidokool-lms/.next/static;
        expires 365d;
        access_log off;
    }

    location /public {
        alias /home/ubuntu/kidokool-lms/public;
        expires 365d;
        access_log off;
    }
}
